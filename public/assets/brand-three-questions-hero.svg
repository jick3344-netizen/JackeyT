<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">品牌三问首页插画</title>
  <desc id="desc">三张纸片和一枚三问印章组成的品牌诊断视觉</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#e6dac4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#7b3028" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="960" height="720" fill="#ede6d7"/>
  <path d="M0 120h960M0 240h960M0 360h960M0 480h960M0 600h960" stroke="#d6cab5" stroke-width="2" opacity=".45"/>
  <circle cx="746" cy="162" r="124" fill="#58634a" opacity=".12"/>
  <circle cx="192" cy="570" r="160" fill="#7b3028" opacity=".08"/>
  <g filter="url(#shadow)">
    <rect x="178" y="152" width="520" height="360" rx="34" fill="url(#paper)" stroke="#cbbfa9" stroke-width="3" transform="rotate(-4 438 332)"/>
    <rect x="270" y="198" width="520" height="360" rx="34" fill="#fffaf0" stroke="#cbbfa9" stroke-width="3" transform="rotate(5 530 378)"/>
    <rect x="220" y="238" width="520" height="360" rx="34" fill="#fbf3e4" stroke="#cbbfa9" stroke-width="3" transform="rotate(-1 480 418)"/>
  </g>
  <g transform="translate(290 284)">
    <text x="0" y="0" font-family="Kaiti SC, STKaiti, serif" font-size="54" fill="#2b2821">你是谁？</text>
    <text x="0" y="92" font-family="Kaiti SC, STKaiti, serif" font-size="54" fill="#2b2821">凭什么选你？</text>
    <text x="0" y="184" font-family="Kaiti SC, STKaiti, serif" font-size="54" fill="#2b2821">凭什么信你？</text>
  </g>
  <g transform="translate(652 448) rotate(-10)">
    <rect width="150" height="150" rx="28" fill="#7b3028"/>
    <rect x="10" y="10" width="130" height="130" rx="22" fill="none" stroke="#ede6d7" stroke-width="5"/>
    <text x="75" y="90" text-anchor="middle" font-family="Kaiti SC, STKaiti, serif" font-size="50" fill="#fffaf0">三问</text>
  </g>
  <text x="96" y="96" font-family="Arial, sans-serif" font-size="18" letter-spacing="6" fill="#70695d">BRAND DIAGNOSIS NOTE</text>
</svg>
